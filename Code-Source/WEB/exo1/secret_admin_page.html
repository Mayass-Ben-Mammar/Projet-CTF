<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Sécurisé</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 100px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 250px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #28a745; color: white; cursor: pointer; margin-left: 10px; }
        #message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔒 Zone d'Administration</h1>
    <p>Veuillez entrer la clé d'accès maître :</p>
    <input type="password" id="keyInput">
    <button onclick="checkKey()">Vérifier</button>
    <div id="message"></div>

    <script>
        const correctHash = "e584bc3c5e9d1dc91f965fc9a7dbacd898249dd7db2f32e91a0f6a880b995caf";
        
        const hiddenFlag = "Q1RGe0MwMEsxRV9NT05TVDNSfQ==";

        async function checkKey() {
            const input = document.getElementById("keyInput").value.trim();
            const message = document.getElementById("message");
            
            const encoder = new TextEncoder();
            const data = encoder.encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === correctHash) {
                const flag = atob(hiddenFlag);
                message.innerHTML = "<span style='color: #55ff55;'>Clé correcte ! Flag : " + flag + "</span>";
            } else {
                message.innerHTML = "<span style='color: #ff5555;'>Clé incorrecte.</span>";
            }
        }
    </script>
</body>
</html>
